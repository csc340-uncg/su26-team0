<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="styles.css">
  <title>Sign Up - FitMatch</title>
</head>

<body>
  <!-- Navigation -->
  <nav>
    <div class="navbar">
       <a href="index.html" class="navbar-brand"> <img src="images/logo.png" width="120" height="92"></a>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html" class="btn btn-outline">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Registration Section -->
  <section class="section" style="padding: 3rem 2rem;">
    <div class="container" style="max-width: 600px;">
      <div class="card">
        <div class="card-content">
          <h2 class="text-center mb-2" style="font-weight: 700; font-size: 1.8rem;">Join FitMatch</h2>
          <p class="text-center text-muted mb-4">Create your customer profile and find your perfect trainer</p>

          <form id="customerForm">
            <!-- Personal Information -->
            <h3 style="font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-color);">Personal Information</h3>

            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" placeholder="John" required>
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" required>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <!-- Fitness Goals -->
            <h3 style="font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-color);">Fitness Goals</h3>

            <div class="form-group">
              <label for="goal">Primary Goal *</label>
              <select id="goal" required>
                <option value="">Select your goal...</option>
                <option value="strength">Strength Training</option>
                <option value="weight-loss">Weight Loss</option>
                <option value="flexibility">Flexibility & Mobility</option>
                <option value="rehab">Rehabilitation</option>
                <option value="endurance">Endurance & Cardio</option>
                <option value="wellness">General Wellness</option>
              </select>
            </div>

            <div class="form-group">
              <label>Current Fitness Level *</label>
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem;">
                <label style="display: flex; align-items: center; margin: 0; font-weight: 500;">
                  <input type="radio" name="level" value="beginner" required style="width: auto; margin-right: 0.5rem;"> Beginner
                </label>
                <label style="display: flex; align-items: center; margin: 0; font-weight: 500;">
                  <input type="radio" name="level" value="intermediate" style="width: auto; margin-right: 0.5rem;"> Intermediate
                </label>
                <label style="display: flex; align-items: center; margin: 0; font-weight: 500;">
                  <input type="radio" name="level" value="advanced" style="width: auto; margin-right: 0.5rem;"> Advanced
                </label>
              </div>
            </div>

            <!-- Constraints & Preferences -->
            <h3 style="font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; color: var(--primary-color);">Constraints & Preferences</h3>

            <div class="form-group">
              <label>Any Injuries or Health Constraints?</label>
              <textarea id="constraints" placeholder="e.g., Lower back pain, Recent shoulder surgery..." style="min-height: 80px;"></textarea>
            </div>

            <div class="form-group">
              <label for="availability">Preferred Session Frequency *</label>
              <select id="availability" required>
                <option value="">Select frequency...</option>
                <option value="once-weekly">Once a week</option>
                <option value="twice-weekly">Twice a week</option>
                <option value="thrice-weekly">Three times a week</option>
                <option value="flexible">Flexible/As needed</option>
              </select>
            </div>

            <div class="form-group">
              <label for="preferredTime">Preferred Training Time *</label>
              <select id="preferredTime" required>
                <option value="">Select time...</option>
                <option value="early-morning">Early Morning (6-8 AM)</option>
                <option value="morning">Morning (8-11 AM)</option>
                <option value="afternoon">Afternoon (12-5 PM)</option>
                <option value="evening">Evening (5-8 PM)</option>
                <option value="late-evening">Late Evening (8-10 PM)</option>
              </select>
            </div>

            <!-- Terms -->
            <div class="form-group" style="margin-top: 1.5rem;">
              <label style="display: flex; align-items: flex-start; margin: 0;">
                <input type="checkbox" id="terms" required style="width: auto; margin-right: 0.5rem; margin-top: 0.25rem;">
                <span>I agree to the Terms of Service and Privacy Policy</span>
              </label>
            </div>

            <!-- Submit Button -->
            <button type="button" class="btn btn-primary btn-large" onclick="registerCustomer()" style="width: 100%; margin-top: 1.5rem;">
              Create Customer Account
            </button>

            <!-- Provider Link -->
            <p class="text-center mt-4">
              Are you a trainer? <a href="provider/register.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Sign up as a provider</a>
            </p>

            <!-- Already has account -->
            <p class="text-center">
              Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Login here</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 FitMatch. All rights reserved.</p>
  </footer>

  <script>
    function registerCustomer() {
      const form = document.getElementById('customerForm');
      if (form.checkValidity()) {
        // Navigate to customer browse trainers page
        window.location.href = 'customer/browse-trainers.html';
      } else {
        alert('Please fill in all required fields');
      }
    }
  </script>
</body>

</html>
