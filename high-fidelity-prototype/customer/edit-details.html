<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="../styles.css">
  <title>My Profile - FitMatch</title>
</head>

<body>
  <div class="container">
    <!-- Navigation -->
    <nav>
      <div class="navbar">
        <a href="../index.html" class="navbar-brand"> <img src="../images/logo.png" width="120" height="92"></a>

        <ul class="nav-links">
          <li><a href="browse-trainers.html" style="color: var(--primary-color); font-weight: 700;">Browse Trainers</a>
          </li>
          <li><a href="my-sessions.html">My Sessions</a></li>
          <li><a href="profile.html">My Profile</a></li>
          <li><a href="../login.html" class="btn btn-outline">Logout</a></li>
        </ul>
      </div>
    </nav>
    <section class="section" style="background: var(--light-gray);">
      <div class="container">
        <h1 style="font-size: 2rem; font-weight: 700;">Edit Personal Information</h1>
        <p class="text-muted">Update your personal details below</p>
      </div>
    </section>
    <section class="section">
      <div class="container" style="max-width: 600px;">
        <div class="card">
          <div class="card-content">
            <form id="editDetailsForm">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="John" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Doe" required>
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" placeholder="+1 (555) 123-4567" required>
              </div>
              <button onClick="window.location.href='profile.html'" class="btn btn-primary">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
