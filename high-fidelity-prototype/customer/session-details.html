<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="../styles.css">
  <title>Session Details - FitMatch</title>
</head>

<body>
  <div class="container">
    <!-- Navigation -->
    <nav>
      <div class="navbar">
        <a href="../index.html" class="navbar-brand"> <img src="../images/logo.png" width="120" height="92"></a>

        <ul class="nav-links">
          <li><a href="browse-trainers.html" style="color: var(--primary-color); font-weight: 700;">Browse Trainers</a>
          </li>
          <li><a href="my-sessions.html">My Sessions</a></li>
          <li><a href="profile.html">My Profile</a></li>
          <li><a href="../login.html" class="btn btn-outline">Logout</a></li>
        </ul>
      </div>
    </nav>

    <!-- Header -->
    <section class="section" style="background: var(--light-gray);">
      <div class="container">
        <h1 style="font-size: 2rem; font-weight: 700;">Session Details</h1>
        <p class="text-muted">View the details of your upcoming training session</p>
      </div>
    </section>
    <!-- Session Details -->
    <section class="section">
      <div class="container">
        <div class="session-card" style="border: 1px solid var(--light-gray); padding: 1rem; border-radius: 8px;">
          <div class="session-header">
            <div class="session-title">Yoga with Sarah</div>
            <div class="session-date">Date: 2024-07-15</div>
            <div class="session-time">Time: 10:00 AM - 11:00 AM</div>
          </div>
          <div class="session-details">
            <div class="detail-item"><span class="detail-label">Trainer:</span> Sarah Johnson</div>
            <div class="detail-item"><span class="detail-label">Location:</span> Studio A, FitMatch Center</div>
            <div class="detail-item"><span class="detail-label">Price:</span> $60</div>
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button class="btn btn-outline" onclick="alert('Rescheduled')">Reschedule</button>
            <button class="btn btn-outline" onclick="alert('Session cancelled')"
              style="color: var(--danger-color); border-color: var(--danger-color);">Cancel</button>
          </div>
        </div>
      </div>

    </section>
  </div>
</body>

</html>
